<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NexGear</title>
  <meta name="title" content="NexGear | Tech Accessories, Audio, Smart Home & Mobile Devices" />
  <meta name="description"
    content="Shop the latest tech at NexGear. Discover premium audio gear, computer accessories, smart home devices, and mobile gadgets designed to upgrade your everyday life." />
  <meta name="keywords"
    content="tech store, gadgets, audio equipment, headphones, computer accessories, keyboards, smart home devices, mobile accessories, electronics shop, NexGear" />
  <meta name="author" content="NexGear" />

  <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://jovan1v9.github.io/NexGear" />
  <meta property="og:title" content="NexGear | Upgrade Your Everyday Tech" />
  <meta property="og:description"
    content="Explore cutting-edge tech including audio gear, smart home devices, and mobile accessories at NexGear." />
  <meta property="og:image" content="https://jovan1v9.github.io/NexGear/assets/img/logo.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://jovan1v9.github.io/NexGear" />
  <meta name="twitter:title" content="NexGear | Upgrade Your Everyday Tech" />
  <meta name="twitter:description"
    content="Discover high-quality tech products from audio to smart home and mobile accessories." />
  <meta name="twitter:image" content="https://jovan1v9.github.io/NexGear/assets/img/logo.png" />

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css"
    integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

  <link rel="stylesheet" href="./assets/css/style.css" />

  <link rel="canonical" href="https://jovan1v9.github.io/NexGear" />
</head>

<body>
  <!-- NAV -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <li class="nav-item">
        <a class="navbar-brand m-0 d-flex align-items-center gap-1" href="./index.html">
          <img src="assets/img/logo.png" class="img-fluid nav-logo" alt="Logo" />
          <p class="fs-1 mb-0 fw-bolder">NEXGEAR</p>
        </a>
      </li>
      <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse"
        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
        aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul id="navRegion" class="navbar-nav ms-auto mb-2 mb-lg-0 d-flex align-items-center gap-4"></ul>
        <a href="./cart.html" class="cartNav d-lg-none d-flex align-items-center justify-content-center gap-2 py-2">
          <div class="cart-icon-wrapper">
            <i class="bi bi-cart3"></i>
            <span class="cartCount">0</span>
          </div>
        </a>
      </div>
      <a href="./cart.html" class="cartNav ms-3 d-none d-lg-block">
        <div class="cart-icon-wrapper">
          <i class="bi bi-cart3"></i>
          <span class="cartCount">0</span>
        </div>
      </a>
    </div>
  </nav>

  <!-- Sale banner -->
  <div id="saleBanner">
    ⚡ Flash Sale! Ends in <span id="bannerCountdown"></span> — Shop now!
    <button id="bannerClose">✕</button>
  </div>

  <section>
    <div class="container-fluid mx-auto text-center my-5">
      <h2 class="fs-1">STORE</h2>
    </div>
  </section>

  <section>
    <div class="container-fluid">
      <div class="row d-flex justify-content-center">
        <div class="col-12 col-md-4 mb-3">
          <div id="productFilter" class="p-3 filter">
            <p>Products</p>
            <div>
              <label for="searchFilter">Search</label>
              <input type="text" id="searchFilter">
            </div>
            <div>
              <label for="categoryFilter">Filter by category</label>
              <select id="categoryFilter"></select>
            </div>
            <div>
              <label for="priceFilter">Max Price: <span id="priceValue">$1500</span></label>
              <input type="range" min="0" max="1500" value="1500" id="priceFilter">
            </div>
            <div id="checkboxFilters">
              <div>
                <label for="favouriteFilter">Favourites</label>
                <input type="checkbox" id="favouriteFilter">
              </div>
              <div>
                <label for="saleFilter">Items on sale</label>
                <input type="checkbox" id="saleFilter">
              </div>
            </div>
            <div>
              <label for="sortFilter">Sort</label>
              <select id="sortFilter">
                <option value="0">Sorting option</option>
                <option value="name-az">Name A-Z</option>
                <option value="name-za">Name Z-A</option>
                <option value="price-high">Highest price</option>
                <option value="price-low">Lowest price</option>
              </select>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-8">
          <div id="productRegion" class="row gy-4 px-5 px-sm-2"></div>
          <div class="d-flex justify-content-center mb-3 mt-5"><button id="btnShowMore">Show More</button></div>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer bg-orange text-white pt-5 pb-3">
    <div class="container">
      <div class="row g-4 text-center text-md-start">
        <div class="col-lg-4 col-md-6 d-flex flex-column align-items-center align-items-md-start">
          <a href="index.html">
            <img src="./assets/img/logo.png" class="img-fluid footer-picture mb-3" alt="Logo"
              style="max-height: 60px; filter: brightness(0) invert(1);">
          </a>
          <p class="small opacity-75" id="p-footer">Making screen time more interactive and fun for everyone.</p>
        </div>

        <div class="col-lg-4 col-md-6 text-center">
          <h5 class="fw-bold mb-3">Quick Links</h5>
          <ul class="list-unstyled quick-links" id="footerLinks">
          </ul>
        </div>

        <div class="col-lg-4 col-md-6 text-center text-md-end social-media">
          <h5 class="fw-bold mb-3" id="social-text">Get in Touch</h5>
          <ul>
            <li><a href="mailto:contact@nexgear.com" class="btn btn-outline-light btn-sm"><i
                  class="bi bi-envelope-fill me-2"></i>contact@nexgear.com</a></li>
            <li>
              <a href="https://www.instagram.com" target="_blank"><i class="bi bi-instagram"></i></a>
              <a href="https://www.twitter.com" target="_blank"><i class="bi bi-twitter"></i></a>
            </li>
          </ul>
        </div>
      </div>

      <hr class="my-4 opacity-25">

      <div class="row align-items-center">
        <div class="col-md-4 text-center text-md-start mb-3 mb-md-0">
          <p class="mb-0 small opacity-75" id="footerTime">&copy;</p>
        </div>
        <div class="col-md-4 text-center">
          <img src="./assets/img/footer-payment.png" class="img-fluid" id="payment-methods" alt="Payment methods">
        </div>
        <div class="col-md-4 text-center text-md-end">
          <div class="d-flex gap-4 justify-content-center justify-content-md-end">
            <a href="./documentation.pdf" class="link-light text-decoration-none small">
              <i class="bi bi-file-earmark-text me-1"></i> Documentation
            </a>
            <a href="/nexgear.zip" class="link-light text-decoration-none small">
              <i class="bi bi-download me-1"></i> Zip
            </a>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <!-- TOAST poruka -->
  <div id="toast" class="toast-container position-fixed top-0 end-0 p-3">
    <div class="toast align-items-center" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage"></div>
        <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="assets/js/main.js"></script>
